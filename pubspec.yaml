name: uniplanner
description: Aplicación móvil de organización estudiantil
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^4.0.3
  cupertino_icons: ^1.0.2
  sqflite: ^2.4.2
  path: ^1.9.1
  shared_preferences: ^2.5.3
  provider: ^6.1.4
  table_calendar: ^3.2.0
  intl: ^0.20.2
  http: ^1.3.0
  flutter_launcher_icons: ^0.14.3
  image_picker: ^1.0.4
  dropdown_button2: ^2.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/uniplanner-icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpg
    - assets/images/back_icon.png
    - assets/images/user_avatar.png
    - assets/images/theme_icon.png
    - assets/images/user_settings_icon.png
    - assets/images/uniplanner.jpeg
    - assets/images/uniplannerlogo.png

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf